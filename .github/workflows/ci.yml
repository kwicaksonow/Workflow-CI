name: CI MLflow Docker Build

on:
  push:
    branches: [ "main" ]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run MLFlow Project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get Latest MLFlow run_id
        run: |
          cd MLProject
          RUN_ID=$(cat run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID berhasil didapatkan: $RUN_ID"

      - name: Install Python Dependencies
        run: pip install mlflow

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifacts
          path: MLProject/mlruns/

      - name: Build Docker Model
        run: |
          cd MLProject
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n titanic-mlflow:latest

      - name: Log In to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: docker tag titanic-mlflow:latest ${{ secrets.DOCKER_USERNAME }}/titanic-mlflow:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/titanic-mlflow:latest
